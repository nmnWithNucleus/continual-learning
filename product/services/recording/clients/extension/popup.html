<!DOCTYPE html>
<!--
  WS-E — Nucleus Capture popup (UI ONLY, D-E5). Static shell: all behaviour in
  popup.js, all styling in popup.css. The popup pulls status (~1s) from the
  offscreen capture engine and renders sensibly as "idle" when that document
  doesn't exist. No external resources.
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Nucleus Capture</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body data-state="idle">
  <header>
    <h1>Nucleus Capture</h1>
    <span id="state-pill">idle</span>
  </header>

  <main>
    <div id="error-banner" role="alert" hidden></div>

    <section id="settings" class="card">
      <label class="field">
        <span class="k">server</span>
        <input id="server-url" type="text" autocomplete="off" spellcheck="false"
               placeholder="http://localhost:8084">
      </label>
      <label class="field">
        <span class="k">user</span>
        <input id="user-id" type="text" autocomplete="off" autocapitalize="none"
               spellcheck="false" placeholder="beta-user">
      </label>
      <div class="field toggles">
        <span class="k">capture</span>
        <label class="toggle"><input id="cap-video" type="checkbox" checked> video</label>
        <span class="cap-hint">the active tab's audio is always captured</span>
      </div>
      <div class="actions">
        <button id="save-btn" type="button">Save</button>
        <span id="save-note" class="note"></span>
      </div>
    </section>

    <section id="controls">
      <button id="record-btn" type="button">Record</button>
      <button id="stop-btn" type="button" hidden>Stop</button>
      <button id="discard-btn" type="button" hidden
              title="Stop retrying and drop unsent segments — the server keeps whatever already arrived">
        Discard unsent</button>
    </section>

    <section id="status" class="card" aria-live="polite">
      <div class="row"><span class="k">device</span><span class="v mono" id="device-id">—</span></div>
      <div id="sources"></div>
    </section>
  </main>

  <script src="popup.js"></script>
</body>
</html>
