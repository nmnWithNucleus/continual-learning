---
terraform_backend_defaults:
  type: gcs
  configuration:
    bucket: nucleus-a3mega-cluster

vars:
  deployment_name: a3mega-base-nucleus
  project_id: poetic-avenue-438401-a7
  region: us-east4
  zone: us-east4-b
  network_name_system: nucleus-a3mega-sys-net1
  subnetwork_name_system: nucleus-a3mega-sys-subnet1
  enable_ops_agent: true
  enable_nvidia_dcgm: true
  enable_nvidia_persistenced: true
  disk_size_gb: 384
  a3mega_dws_flex_enabled: false
  a3mega_enable_spot_vm: false
  final_image_family: slurm-a3mega-nucleus
  slurm_cluster_name: nucla3m
  a3mega_reservation_name: nvidia-h100-dkydfas6m486t   # 32-GPU reservation
  a3mega_maintenance_interval: PERIODIC
  a3mega_cluster_size: 8

  # Nucleus compute nodes have no extra data disk.
  a3mega_additional_disks: []
